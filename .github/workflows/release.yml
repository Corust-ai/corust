name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Checkout the private agent repo (requires AGENT_REPO_PAT secret)
      - uses: actions/checkout@v4
        with:
          repository: Corust-ai/corust-agent-rs
          token: ${{ secrets.AGENT_REPO_PAT }}
          path: _agent

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Install cross-compilation toolchain for aarch64 Linux
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      # Build corust-cli
      - name: Build corust-cli
        run: cargo build --release --target ${{ matrix.target }}

      # Build corust-agent-acp from private repo
      - name: Build corust-agent-acp
        working-directory: _agent
        run: cargo build --release --target ${{ matrix.target }} -p acp

      # Package both binaries together
      - name: Package
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          archive="corust-${tag}-${{ matrix.target }}"
          mkdir -p "$archive"

          cp "target/${{ matrix.target }}/release/corust-cli" "$archive/"
          cp "_agent/target/${{ matrix.target }}/release/corust-agent-acp" "$archive/"
          cp README.md LICENSE "$archive/"

          if [[ "${{ matrix.os }}" == ubuntu-* ]]; then
            tar czf "${archive}.tar.gz" "$archive"
            echo "ASSET=${archive}.tar.gz" >> "$GITHUB_ENV"
          else
            tar czf "${archive}.tar.gz" "$archive"
            echo "ASSET=${archive}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS.txt
